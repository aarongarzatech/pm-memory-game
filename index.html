<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PM Memory Game v1.4.0</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --txt:#1a1a18;--txt2:#5f5e5a;--txt3:#888780;
  --brd:rgba(0,0,0,0.12);--brd2:rgba(0,0,0,0.22);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#323230;--txt:#f0ede8;--txt2:#b4b2a9;--txt3:#888780;--brd:rgba(255,255,255,0.1);--brd2:rgba(255,255,255,0.18);}
}
body{font-family:var(--font);background:var(--bg3);height:100vh;width:100vw;overflow:hidden;display:flex;align-items:stretch;margin:0;padding:0;}

/* LOBBY */
#lobby{width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
#lobby h1{font-size:22px;font-weight:500;color:var(--txt);margin-bottom:6px;}
#lobby p{font-size:13px;color:var(--txt2);margin-bottom:24px;}
#lobby-inner{width:380px;}
#lobby h1{font-size:22px;font-weight:500;color:var(--txt);margin-bottom:6px;}
#lobby p{font-size:13px;color:var(--txt2);margin-bottom:24px;}
.card-box{background:var(--bg);border:0.5px solid var(--brd);border-radius:12px;padding:24px;margin-bottom:16px;}
.card-box h2{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:14px;}
.input-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.input-row label{font-size:12px;color:var(--txt2);width:80px;flex-shrink:0;}
.input-row input{flex:1;font-size:13px;padding:7px 10px;border:0.5px solid var(--brd2);border-radius:6px;background:var(--bg);color:var(--txt);outline:none;}
.input-row input:focus{border-color:#534AB7;box-shadow:0 0 0 2px #EEEDFE;}
.btn-primary{width:100%;padding:9px;font-size:14px;font-weight:500;background:#534AB7;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:4px;}
.btn-primary:hover{background:#7F77DD;}
.btn-primary:disabled{background:#AFA9EC;cursor:not-allowed;}
.divider{text-align:center;font-size:12px;color:var(--txt3);margin:8px 0;}
#room-code-display{font-size:28px;font-weight:500;letter-spacing:.15em;color:#534AB7;text-align:center;margin:10px 0 6px;font-family:monospace;}
#lobby-status{font-size:13px;color:var(--txt2);text-align:center;margin-top:8px;}
#players-waiting{margin-top:10px;}
.waiting-player{font-size:12px;color:var(--txt2);padding:3px 0;display:flex;align-items:center;gap:6px;}
.waiting-dot{width:6px;height:6px;border-radius:50%;background:#1D9E75;}

/* GAME */
#game{display:none;flex-direction:row;gap:0;width:100%;height:100vh;background:var(--bg);overflow:hidden;}
#sidebar{width:230px;min-width:230px;border-right:0.5px solid var(--brd);display:flex;flex-direction:column;padding:14px 12px;gap:14px;overflow-y:auto;height:100vh;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}
#board-wrap{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px;min-height:0;overflow:hidden;}
#top-bar{display:flex;align-items:center;justify-content:space-between;padding-bottom:4px;}
#top-bar-left{font-size:13px;font-weight:500;color:var(--txt2);}
#turn-info{font-size:12px;color:var(--txt2);}
#board{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(4,1fr);gap:8px;flex:1;min-height:0;}
.card{perspective:500px;cursor:pointer;min-height:0;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .3s ease;border-radius:8px;}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg);}
.card-back,.card-front{position:absolute;inset:0;border-radius:8px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;}
.card-back{background:#534AB7;border:0.5px solid #3C3489;}
.card-back-pat{width:55%;height:55%;opacity:.35;}
.card-front{transform:rotateY(180deg);background:var(--bg);border:0.5px solid var(--brd2);font-size:11px;font-weight:500;text-align:center;padding:4px;line-height:1.25;color:var(--txt);flex-direction:column;}
.card-front .cat-dot{width:6px;height:6px;border-radius:50%;margin:0 auto 4px;}
.card.matched .card-front{border-color:#1D9E75;background:#E1F5EE;}
.card.matched .card-front .card-label{color:#085041;}
.card.blocked{pointer-events:none;}
.card:not(.flipped):not(.matched):not(.blocked):hover .card-back{background:#7F77DD;}

#result-panel{min-height:240px;max-height:42vh;border-top:0.5px solid var(--brd);padding:20px 24px;display:flex;gap:18px;align-items:center;flex-shrink:0;}
#res-empty{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--txt3);font-size:14px;width:100%;}
#res-content{display:none;width:100%;gap:12px;align-items:stretch;}
#res-icon{width:120px;min-width:120px;border-radius:10px;border:0.5px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:48px;background:var(--bg2);align-self:stretch;}
#res-text{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
#res-tag{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:5px;display:inline-block;width:fit-content;margin-bottom:6px;}
#res-title{font-size:19px;font-weight:600;color:var(--txt);line-height:1.25;margin-bottom:3px;}
#res-sub{font-size:13px;color:var(--txt2);margin-bottom:8px;}
#res-body{font-size:13px;color:var(--txt2);line-height:1.6;}
#res-metrics{display:flex;gap:10px;margin-top:12px;}
.rmet{background:var(--bg2);border-radius:8px;padding:8px 14px;}
.rmet-l{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.rmet-v{font-size:20px;font-weight:600;color:var(--txt);line-height:1.1;}

.sb-section{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);margin-bottom:4px;}
.player-row{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:8px;border:0.5px solid transparent;transition:background .2s,border .2s;}
.player-row.active{background:#EEEDFE;border-color:#AFA9EC;}
.player-row .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
.player-row .pname{font-size:12px;font-weight:500;color:var(--txt);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.player-row.active .pname{color:#3C3489;}
.player-row .perf{font-size:11px;color:var(--txt2);white-space:nowrap;}
.player-row.active .perf{color:#534AB7;font-weight:500;}
.cat-block{padding:8px 0 4px;border-bottom:0.5px solid var(--brd);}
.cat-block:last-child{border-bottom:none;}
.cat-name{font-size:11px;font-weight:500;color:var(--txt2);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.cat-dot-s{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cat-progress{font-size:10px;color:var(--txt3);margin-bottom:4px;}
.cat-player-line{font-size:11px;color:var(--txt2);padding:1px 0;display:flex;justify-content:space-between;}
.card-icon-wrap{font-size:18px;margin-bottom:4px;line-height:1;}
#timer-bar{height:3px;background:#534AB7;border-radius:2px;transition:width 1s linear;}
#timer-text{font-size:11px;color:var(--txt2);}
#timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
#pause-btn{font-size:11px;padding:2px 7px;border-radius:5px;border:0.5px solid var(--brd2);background:transparent;color:var(--txt2);cursor:pointer;line-height:1.6;}
#pause-btn:hover{background:var(--bg2);}
#pause-btn.paused{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489;}
#win-lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(20,18,30,0.55);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:24px;animation:winFade .25s ease;}
@keyframes winFade{from{opacity:0;}to{opacity:1;}}
#win-modal{background:var(--bg);border:0.5px solid var(--brd);border-radius:20px;padding:36px 40px 32px;width:440px;max-width:100%;max-height:90vh;overflow-y:auto;text-align:center;position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.35);animation:winPop .35s cubic-bezier(.2,.8,.3,1.2);}
@keyframes winPop{from{transform:scale(.85) translateY(20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
#win-crown{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#F4C430,#E89B1C);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(232,155,28,0.4);}
#win-crown i{font-size:34px;color:#fff;}
#win-eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;}
#win-winner-name{font-size:30px;font-weight:700;color:var(--txt);line-height:1.1;margin-bottom:4px;}
#win-winner-sub{font-size:14px;color:var(--txt2);margin-bottom:24px;}
#win-standings{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.win-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:var(--bg2);}
.win-row.first{background:#FBF3D9;border:0.5px solid #F4C430;}
.win-rank{font-size:13px;font-weight:600;color:var(--txt3);width:22px;text-align:center;flex-shrink:0;}
.win-row.first .win-rank{color:#B8860B;}
.win-name{font-size:14px;font-weight:500;color:var(--txt);flex:1;text-align:left;}
.win-stats{font-size:12px;color:var(--txt2);text-align:right;white-space:nowrap;}
.win-matches{font-size:16px;font-weight:600;color:var(--txt);}
#win-cat-breakdown{display:flex;gap:8px;margin-bottom:24px;justify-content:center;flex-wrap:wrap;}
.win-cat{flex:1;min-width:90px;background:var(--bg2);border-radius:10px;padding:10px 8px;}
.win-cat-dot{width:8px;height:8px;border-radius:50%;margin:0 auto 5px;}
.win-cat-name{font-size:10px;color:var(--txt3);line-height:1.2;margin-bottom:3px;}
.win-cat-val{font-size:15px;font-weight:600;color:var(--txt);}
#play-again-btn{width:100%;padding:12px;font-size:15px;font-weight:600;background:#534AB7;color:#fff;border:none;border-radius:10px;cursor:pointer;}
#play-again-btn:hover{background:#7F77DD;}
#win-host-note{font-size:11px;color:var(--txt3);margin-top:10px;min-height:14px;}
#room-badge{font-size:11px;color:var(--txt3);text-align:center;padding:4px 0 0;}
#my-turn-toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#534AB7;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:100;pointer-events:none;}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div id="lobby-inner">
  <h1 id="lobby-title">PM Memory Game</h1>
  <p id="lobby-subtitle">Guidewheel Interview | CEMEX USA PMO</p>
  <div style="font-size:11px;color:var(--txt3);margin-bottom:16px;">Version 1.4.0</div>

  <div class="card-box">
    <h2>Create a new room</h2>
    <div class="input-row"><label>Your name</label><input id="create-name" placeholder="Enter your name..." maxlength="16"/></div>
    <button class="btn-primary" id="create-btn">Create room</button>
  </div>

  <div class="divider">or join an existing room</div>

  <div class="card-box">
    <h2>Join a room</h2>
    <div class="input-row"><label>Your name</label><input id="join-name" placeholder="Enter your name..." maxlength="16"/></div>
    <div class="input-row"><label>Room code</label><input id="join-code" placeholder="4-letter code..." maxlength="4" style="text-transform:uppercase;letter-spacing:.1em;font-size:16px;font-weight:500;"/></div>
    <button class="btn-primary" id="join-btn">Join room</button>
  </div>

  <div id="lobby-status"></div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="sidebar">
    <div>
      <div class="sb-section">Players</div>
      <div id="player-list"></div>
      <div style="margin-top:8px;">
        <div id="timer-row">
          <span style="font-size:11px;color:var(--txt2);">Turn timer</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span id="timer-text">15s</span>
            <button id="pause-btn" title="Pause/resume timer">&#9646;&#9646;</button>
          </div>
        </div>
        <div id="timer-bar-wrap"><div id="timer-bar" style="width:100%;"></div></div>
      </div>
    </div>
    <div>
      <div class="sb-section">Categories</div>
      <div id="cat-list"></div>
    </div>
    <div id="room-badge"></div>
  </div>

  <div id="main">
    <div id="board-wrap">
      <div id="top-bar">
        <div id="top-bar-left">Memory Game</div>
        <div id="turn-info"></div>
      </div>
      <div id="board" role="grid"></div>
    </div>

    <div id="result-panel">
      <div id="res-empty">&#9654; Find a match to reveal a card detail</div>
      <div id="res-content">
        <div id="res-icon"></div>
        <div id="res-text">
          <div>
            <div id="res-tag"></div>
            <div id="res-title"></div>
            <div id="res-sub"></div>
            <div id="res-body"></div>
          </div>
          <div id="res-metrics">
            <div class="rmet"><div class="rmet-l" id="rm1l"></div><div class="rmet-v" id="rm1v"></div></div>
            <div class="rmet"><div class="rmet-l" id="rm2l"></div><div class="rmet-v" id="rm2v"></div></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div id="win-lightbox">
    <div id="win-modal">
      <div id="win-confetti"></div>
      <div id="win-crown"><i class="fa-solid fa-trophy" aria-hidden="true"></i></div>
      <div id="win-eyebrow">Game over</div>
      <div id="win-winner-name"></div>
      <div id="win-winner-sub"></div>
      <div id="win-standings"></div>
      <div id="win-cat-breakdown"></div>
      <button id="play-again-btn">Play again</button>
      <div id="win-host-note"></div>
    </div>
  </div>
</div>

<div id="my-turn-toast">Your turn!</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYyYds1GhZ9yN2P56qkPVyBFKUArfppJI",
  authDomain: "guidewheel-aaron-garza.firebaseapp.com",
  databaseURL: "https://guidewheel-aaron-garza-default-rtdb.firebaseio.com",
  projectId: "guidewheel-aaron-garza",
  storageBucket: "guidewheel-aaron-garza.firebasestorage.app",
  messagingSenderId: "913347638131",
  appId: "1:913347638131:web:815331d6235f0ef1d70b06"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── DATA ──────────────────────────────────────────────────────────────────────
// ── GAME DATA ─────────────────────────────────────────────────────────────────
const DEFAULT_CATEGORIES = [
  { id:"pm", name:"PM Journey highlights", color:"#534AB7", bg:"#EEEDFE", textColor:"#3C3489",
    pairs:[
      {icon:"fa-shield-halved",title:"Coverage x5",subtitle:"Balcones plant turnaround",body:"The project kicked off without a clearly handed-down scope and a new plant manager only three months in the role. Quick wins were the priority: A formal prioritization framework was built around functional locations using Availability, OEE, and MTBF metrics. A field data capture app was built for iPad with LTE connectivity to work around tough PPE and dust conditions on the floor. Data was stored in AWS, managed through a Nubuilder front-end, and the team was trained in proper data housekeeping from day one.",m1l:"PM Coverage delta",m1v:"+47 pp",m2l:"Range",m2v:"11% to 58%"},
      {icon:"fa-trophy",title:"100% approved",subtitle:"Lyons: Aligned agility using a proven system",body:"The last plant in the project had the most complete system: Poka-yoke mechanisms built in at every step, a fully streamlined workflow, and the only site to finish all strategy, task, and equipment approvals within the designated window. The inventory ran in freezing weather alongside recently graduated TDP engineers, while the plant was navigating a quarry shutdown under county scrutiny. A custom SAP training course was also delivered so stakeholders could manage future equipment changes independently.",m1l:"PM Coverage delta",m1v:"+71 pp",m2l:"Range",m2v:"5% to 76%"},
      {icon:"fa-screwdriver-wrench",title:"PM strategies x3.7",subtitle:"Clinchfield: The most complex plant in the project",body:"Clinchfield was the oldest and most technically demanding plant in the engagement: Heavy equipment, deep maintenance complexity, and specialized routes in NDT, Vibration, and Gearbox Alignment all owned by one person nearing retirement. Capturing that knowledge before it walked out the door was as much a priority as the PM optimization itself. Asset registrations were built from near zero into a fully documented equipment hierarchy. PM strategies were structured into SAP-ready upload packages with custom catalog profiles per equipment type.",m1l:"PM Strategies delta",m1v:"+1943",m2l:"Range",m2v:"714 to 2657"},
      {icon:"fa-medal",title:"Best in the US",subtitle:"Demopolis: Scope expands mid-project",body:"At Demopolis a second project was stacked on top of the PM optimization mid-stay: The plant was dealing with low availability and costly failures from aging belt conveyors. The ask was to find short-term solutions by ensuring the maintenance team's time was being optimally utilized. A scheduling app was built to select deficient task parameters, filter upcoming maintenance work, and automatically generate a schedule suggestion based on the plant's priorities and available person-hours. Handling two concurrent deliverables without compromising either taught a key lesson about scope management under pressure. The result placed Demopolis as the best-performing plant for maintenance compliance across all CEMEX USA operations.",m1l:"PM Compliance rank",m1v:"#1 in US",m2l:"Benchmark",m2v:"CEMEX USA"}
    ]
  },
  { id:"fun", name:"Fun facts", color:"#1D9E75", bg:"#E1F5EE", textColor:"#085041",
    pairs:[
      {icon:"fa-person-chalkboard",title:"Meet Gary",subtitle:"Clinchfield: The knowledge that almost walked out the door",body:"Gary was the only person at Clinchfield who could execute NDT, Vibration, and Gearbox Alignment routes. He guided the team through kilometers of belt conveyors and highly specialized mining equipment including Gamma Ray analyzers. As the inventory database took shape, Gary asked for access so he could train his replacement from his desk. He had been dreading the alternative: Physically walking a new recruit through every piece of equipment across the entire plant. The database made that unnecessary. His knowledge stayed, even after he left.",m1l:"Assets documented",m1v:"+166",m2l:"Range",m2v:"772 to 938"},
      {icon:"fa-train",title:"Two plants one project",subtitle:"Victorville: Quarry and Mill connected by rail",body:"Victorville is not one plant but two: A Quarry and a Milling section operating as separate facilities with trains carrying raw material between them. Both maintenance managers had to be aligned simultaneously on PM strategy, equipment priorities, and data quality standards. The Quarry Manager's first ask was updating routes for mobile equipment, while the Mill focused on coverage gaps in fixed assets. Running a single PM optimization across two physically separate operations with independent management chains required coordination that went well beyond the standard plant engagement.",m1l:"PM Coverage delta",m1v:"+68 pp",m2l:"Range",m2v:"6% to 74%"},
      {icon:"fa-snowflake",title:"Cold-weather audit",subtitle:"Lyons: Inventory in one of Boulder's snowiest Januaries on record",body:"January 2022 was one of Boulder's snowiest months in years: 30 inches of snowfall and the first month to close with colder-than-normal temperatures since the previous May. That was the exact month the Lyons plant inventory ran. The plant had just shut down its quarry and was under active scrutiny from Boulder County council, making impeccable maintenance performance a direct contribution to the plant's standing with local authorities and its long-term operational sustainability in the community. Field work ran in freezing conditions alongside two recently graduated TDP engineers using custom printed equipment cards for manual data capture on the floor.",m1l:"PM Coverage delta",m1v:"+71 pp",m2l:"Highest in project",m2v:"5% to 76%"}
    ]
  },
  { id:"learn", name:"Learning moments", color:"#D85A30", bg:"#FAECE7", textColor:"#712B13",
    pairs:[
      {icon:"fa-arrow-trend-up",title:"Zero errors",subtitle:"Victorville: From Excel chaos to single source of truth",body:"Logical workflow errors were occurring at least once a week while Excel served as both database and PM tool. Full control of the project tracking system was taken, issues were documented, and Excel was demoted to a data capture input only. Airtable became the single source of truth with specialized views covering every step: Equipment assignment, task personalization, SAP update tracking, route index generation, and work order text output. Preventable errors were completely eradicated.",m1l:"PM Coverage delta",m1v:"+68 pp",m2l:"Range",m2v:"6% to 74%"},
      {icon:"fa-people-carry-box",title:"Juggling roles",subtitle:"Miami: When the team shrinks mid-project",body:"A mechanical engineer working remotely on maintenance strategy design fell ill and had to leave the project mid-delivery. His role, translating field inventory into structured PM strategies, had to be absorbed without losing momentum. Every remaining team member was cross-trained on all tools, inputs, and outputs to cover the gap. Miami's plans also required deeper normalization than other plants: Grouped route tasks were split into individual routines, nearly tripling the plan count. The process held, proving it was robust enough to survive an unplanned personnel change mid-flight.",m1l:"PM Plans delta",m1v:"+2159",m2l:"Range",m2v:"1350 to 3509"},
      {icon:"fa-compass",title:"Own the scope",subtitle:"Balcones: Organic roles in a fast-launched project",body:"The project launched at Balcones with only a couple of weeks of prior planning, barely enough time to sketch out the team's roles before hitting the floor. Functions were picked up organically as the work unfolded, with each team member absorbing responsibilities as the scope became clearer in real time. On top of that, the plant manager was only three months into the job, inheriting a record of underperformance and needing visible results fast. Rather than waiting for a formal mandate, ownership of data quality was claimed from day one. A prioritization framework built around Availability, OEE, and MTBF turned an ambiguous start into a credible project foundation.",m1l:"PM Coverage delta",m1v:"+47 pp",m2l:"Range",m2v:"11% to 58%"}
    ]
  }
];

let CATEGORIES = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
let GAME_TITLE = 'PM Memory Game';
let GAME_SUBTITLE = 'Guidewheel Interview | CEMEX USA PMO';


const AVATAR_COLORS=[["#EEEDFE","#534AB7"],["#E1F5EE","#0F6E56"],["#FAECE7","#993C1D"],["#E6F1FB","#185FA5"]];
function getTotalPairs(){ return CATEGORIES.reduce((s,c)=>s+c.pairs.length,0); }
function getEmptyCatMatches(){ const o={}; CATEGORIES.forEach(c=>{ o[c.id]={}; }); return o; }

// ── LOCAL STATE ───────────────────────────────────────────────────────────────
let myName = '';
let myPlayerId = '';
let roomCode = '';
let isHost = false;
let localTimerInterval = null;
let lastTimerStart = null;
let lastKnownTurnPlayer = null;
let gameState = null; // mirror of Firebase state

// ── HELPERS ───────────────────────────────────────────────────────────────────
function rndCode(){ return Math.random().toString(36).substring(2,6).toUpperCase(); }
function initials(n){ return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function catById(id){ return CATEGORIES.find(c=>c.id===id); }
function pairByCardId(cardId){
  const [catId, pi] = cardId.split('-');
  const cat = catById(catId);
  return cat ? { cat, pair: cat.pairs[parseInt(pi)] } : null;
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildCardOrder(){
  let all=[];
  CATEGORIES.forEach(cat=>{
    cat.pairs.forEach((pair,pi)=>{
      const id=cat.id+'-'+pi;
      all.push(id); all.push(id);
    });
  });
  return shuffle(all);
}

function setStatus(msg){ document.getElementById('lobby-status').textContent = msg; }

// ── LOBBY ─────────────────────────────────────────────────────────────────────
document.getElementById('create-btn').addEventListener('click', async ()=>{
  const name = document.getElementById('create-name').value.trim();
  if(!name){ alert('Enter your name first.'); return; }
  myName = name;
  myPlayerId = 'p_' + Date.now();
  isHost = true;
  roomCode = rndCode();

  const cardOrder = buildCardOrder();
  const initialState = {
    status: 'waiting',
    cardOrder,
    flipped: [],
    matched: {},
    currentPlayer: 0,
    bonusTurn: false,
    timerStart: Date.now(),
    pausedAt: null,
    pausedElapsed: 0,
    players: { [myPlayerId]: { name, turns:0, matches:0, joinedAt: Date.now() } },
    playerOrder: [myPlayerId],
    catMatches: getEmptyCatMatches(),
    lastMatch: null
  };

  await set(ref(db, `rooms/${roomCode}`), initialState);
  setStatus(`Room created! Code: ${roomCode}, waiting for players...`);
  document.getElementById('create-btn').disabled = true;
  listenToRoom();
});

document.getElementById('join-btn').addEventListener('click', async ()=>{
  const name = document.getElementById('join-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if(!name || !code){ alert('Enter your name and room code.'); return; }

  const snap = await get(ref(db, `rooms/${code}`));
  if(!snap.exists()){ alert('Room not found. Check the code.'); return; }

  const state = snap.val();
  if(state.status === 'playing'){ alert('Game already in progress.'); return; }

  const playerCount = Object.keys(state.players||{}).length;
  if(playerCount >= 4){ alert('Room is full (max 4 players).'); return; }

  myName = name;
  myPlayerId = 'p_' + Date.now();
  roomCode = code;
  isHost = false;

  await update(ref(db, `rooms/${code}/players/${myPlayerId}`), { name, turns:0, matches:0, joinedAt: Date.now() });
  await runTransaction(ref(db, `rooms/${code}/playerOrder`), (order)=>{
    if(!order) order = [];
    if(!order.includes(myPlayerId)) order.push(myPlayerId);
    return order;
  });

  setStatus(`Joined room ${code}! Waiting for host to start...`);
  document.getElementById('join-btn').disabled = true;
  listenToRoom();
});

function listenToRoom(){
  onValue(ref(db, `rooms/${roomCode}`), (snap)=>{
    if(!snap.exists()) return;
    const state = snap.val();
    gameState = state;

    if(state.status === 'waiting'){
      renderWaitingLobby(state);
    } else if(state.status === 'playing'){
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game').style.display = 'flex';
      renderGame(state);
    } else if(state.status === 'finished'){
      renderGame(state);
      showWinBanner(state);
    }
  });
}

function renderWaitingLobby(state){
  const players = Object.values(state.players||{});
  let html = `<div style="margin-top:16px;"><strong style="font-size:13px;">${players.length} player(s) in room ${roomCode}:</strong>`;
  players.forEach(p=>{
    html += `<div class="waiting-player"><div class="waiting-dot"></div>${p.name}</div>`;
  });
  html += '</div>';
  if(isHost){
    if(players.length >= 2){
      html += `<button class="btn-primary" id="start-btn" style="margin-top:16px;">Start game (${players.length} players)</button>`;
    } else {
      html += `<div style="font-size:12px;color:var(--txt3);margin-top:12px;">Waiting for at least 1 more player...</div>`;
    }
  } else {
    html += `<div style="font-size:12px;color:var(--txt3);margin-top:12px;">Waiting for host to start...</div>`;
  }
  document.getElementById('lobby-status').innerHTML = html;
  if(isHost && players.length >= 2){
    document.getElementById('start-btn')?.addEventListener('click', async ()=>{
      await update(ref(db, `rooms/${roomCode}`), { status: 'playing', timerStart: Date.now(), pausedAt: null, pausedElapsed: 0 });
    });
  }
}

// ── GAME RENDER ───────────────────────────────────────────────────────────────
let boardBuilt = false;

function renderGame(state){
  if(!boardBuilt){
    buildBoardDOM(state.cardOrder);
    boardBuilt = true;
    document.getElementById('room-badge').textContent = `Room: ${roomCode}`;
  }

  const { players, playerOrder, currentPlayer, flipped, matched, catMatches, bonusTurn, lastMatch, timerStart, pausedAt, pausedElapsed } = state;
  const orderedPlayers = (playerOrder||[]).map(id=>({ id, ...(players[id]||{}) }));
  const activeId = playerOrder[currentPlayer] || playerOrder[0];
  const amIActive = (activeId === myPlayerId);

  // Show toast if it just became my turn
  if(lastKnownTurnPlayer !== activeId){
    lastKnownTurnPlayer = activeId;
    if(amIActive) showToast("Your turn!");
  }

  renderPlayerList(orderedPlayers, activeId);
  renderCatList(catMatches||{});
  updateTurnInfo(players[activeId]?.name, bonusTurn, amIActive);
  renderBoard(state);
  updateTimer(timerStart, pausedAt||null, pausedElapsed||0, amIActive, state);

  if(lastMatch){
    const info = pairByCardId(lastMatch);
    if(info) showResult(info.cat, info.pair);
  }
}

function buildBoardDOM(cardOrder){
  const board = document.getElementById('board');
  board.innerHTML = '';
  const total = (cardOrder||[]).length;
  const cols = Math.ceil(Math.sqrt(total * (16/9)));
  const rows = Math.ceil(total / cols);
  board.style.gridTemplateColumns = 'repeat('+cols+',1fr)';
  board.style.gridTemplateRows = 'repeat('+rows+',1fr)';
  (cardOrder||[]).forEach((cardId, idx)=>{
    const info = pairByCardId(cardId);
    if(!info) return;
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.cardId = cardId;
    el.dataset.idx = idx;
    el.innerHTML = `<div class="card-inner">
      <div class="card-back"><svg class="card-back-pat" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="10" stroke="white" stroke-width="1.5"/><circle cx="20" cy="20" r="16" stroke="white" stroke-width="0.75"/><line x1="20" y1="4" x2="20" y2="36" stroke="white" stroke-width="0.75"/><line x1="4" y1="20" x2="36" y2="20" stroke="white" stroke-width="0.75"/></svg></div>
      <div class="card-front"><div class="cat-dot" style="background:${info.cat.color};"></div><div class="card-label" style="font-size:11px;line-height:1.25;">${info.pair.title}</div></div>
    </div>`;
    el.addEventListener('click', ()=>onCardClick(el, idx, cardId));
    board.appendChild(el);
  });
}

function renderBoard(state){
  const { flipped=[], matched={}, playerOrder, currentPlayer } = state;
  const activeId = playerOrder[currentPlayer] || playerOrder[0];
  const amIActive = (activeId === myPlayerId);
  const matchedKeys = Object.keys(matched||{});

  document.querySelectorAll('.card').forEach(el=>{
    const idx = parseInt(el.dataset.idx);
    const cardId = el.dataset.cardId;
    const isFlipped = flipped.includes(idx);
    const isMatched = matchedKeys.includes(String(idx));
    el.classList.toggle('flipped', isFlipped || isMatched);
    el.classList.toggle('matched', isMatched);
    el.classList.toggle('blocked', !amIActive || isMatched || isFlipped);
  });
}

function renderPlayerList(orderedPlayers, activeId){
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  orderedPlayers.forEach((p,i)=>{
    const pct = p.turns===0 ? '—' : Math.round((p.matches/p.turns)*100)+'%';
    const [abg,atxt] = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const isActive = p.id === activeId;
    const row = document.createElement('div');
    row.className = 'player-row' + (isActive?' active':'');
    row.innerHTML = `<div class="avatar" style="background:${abg};color:${atxt};">${initials(p.name||'?')}</div><span class="pname">${p.name||'?'}${p.id===myPlayerId?' (you)':''}</span><span class="perf">${pct}</span>`;
    list.appendChild(row);
  });
}

function renderCatList(catMatches){
  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  CATEGORIES.forEach(cat=>{
    const total = cat.pairs.length;
    const cm = catMatches[cat.id]||{};
    const found = Object.values(cm).reduce((s,v)=>s+v,0);
    let playerLines = '';
    Object.entries(cm).forEach(([pname,count])=>{
      playerLines += `<div class="cat-player-line"><span>${pname}</span><span style="font-weight:500;">${count}</span></div>`;
    });
    const block = document.createElement('div');
    block.className = 'cat-block';
    block.innerHTML = `<div class="cat-name"><div class="cat-dot-s" style="background:${cat.color};"></div><span style="color:var(--txt);">${cat.name}</span></div><div class="cat-progress" style="color:${cat.color};">${found}/${total} found</div>${playerLines}`;
    list.appendChild(block);
  });
}

function updateTurnInfo(playerName, bonusTurn, amIActive){
  const who = amIActive ? 'Your turn' : `${playerName}'s turn`;
  document.getElementById('turn-info').textContent = bonusTurn ? `${who}: bonus!` : who;
  document.getElementById('top-bar-left').textContent = amIActive ? 'Your move' : 'Memory Game';
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function updateTimer(timerStart, pausedAt, pausedElapsed, amIActive, state){
  if(localTimerInterval) clearInterval(localTimerInterval);

  const btn = document.getElementById('pause-btn');
  const isPaused = pausedAt !== null && pausedAt !== undefined;
  btn.textContent = isPaused ? '▶' : '⏸';
  btn.classList.toggle('paused', isPaused);
  btn.title = isPaused ? 'Resume timer' : 'Pause timer';

  function getLeft(){
    if(isPaused){
      return Math.max(0, 15 - Math.floor((pausedElapsed||0) / 1000));
    }
    const totalElapsed = (pausedElapsed||0) + (Date.now() - timerStart);
    return Math.max(0, 15 - Math.floor(totalElapsed / 1000));
  }

  function tick(){
    const left = getLeft();
    document.getElementById('timer-text').textContent = left + 's';
    const pct = Math.round((left/15)*100);
    const bar = document.getElementById('timer-bar');
    bar.style.width = pct + '%';
    bar.style.background = left<=5?'#E24B4A':left<=9?'#EF9F27':'#534AB7';
    if(left <= 0 && amIActive && !isPaused){
      clearInterval(localTimerInterval);
      advanceTurn(state, true);
    }
  }

  tick();
  if(!isPaused) localTimerInterval = setInterval(tick, 500);
}

// Pause button — any player can pause (host-only restriction can be added later)
document.getElementById('pause-btn').addEventListener('click', async ()=>{
  if(!gameState || gameState.status !== 'playing') return;
  const { pausedAt, pausedElapsed, timerStart } = gameState;
  const isPaused = pausedAt !== null && pausedAt !== undefined;
  if(isPaused){
    // Resume: shift timerStart forward so elapsed resets correctly
    await update(ref(db, `rooms/${roomCode}`), {
      timerStart: Date.now(),
      pausedAt: null,
      pausedElapsed: pausedElapsed || 0
    });
  } else {
    // Pause: record how much time has already elapsed
    const elapsed = (pausedElapsed||0) + (Date.now() - timerStart);
    await update(ref(db, `rooms/${roomCode}`), {
      pausedAt: Date.now(),
      pausedElapsed: elapsed
    });
  }
});

// ── CARD CLICK ────────────────────────────────────────────────────────────────
async function onCardClick(el, idx, cardId){
  if(!gameState) return;
  const { playerOrder, currentPlayer, flipped=[], matched={} } = gameState;
  const activeId = playerOrder[currentPlayer] || playerOrder[0];
  if(activeId !== myPlayerId) return;
  if(flipped.includes(idx) || matched[idx]) return;
  if(flipped.length >= 2) return;

  const newFlipped = [...flipped, idx];
  await update(ref(db, `rooms/${roomCode}`), { flipped: newFlipped });

  if(newFlipped.length === 2){
    const [iA, iB] = newFlipped;
    const idA = gameState.cardOrder[iA];
    const idB = gameState.cardOrder[iB];

    if(idA === idB){
      // Match!
      setTimeout(async ()=>{
        const newMatched = { ...(gameState.matched||{}), [iA]: true, [iB]: true };
        const playerName = gameState.players[myPlayerId]?.name || myName;
        const catId = idA.split('-')[0];

        // Update cat matches
        const catM = JSON.parse(JSON.stringify(gameState.catMatches||getEmptyCatMatches()));
        if(!catM[catId]) catM[catId]={};
        catM[catId][playerName] = (catM[catId][playerName]||0) + 1;

        // Update player stats
        const prevMatches = gameState.players[myPlayerId]?.matches||0;

        const totalMatched = Object.keys(newMatched).length / 2;
        const isFinished = totalMatched >= getTotalPairs();

        const updates = {
          flipped: [],
          matched: newMatched,
          catMatches: catM,
          lastMatch: idA,
          [`players/${myPlayerId}/matches`]: prevMatches + 1,
        };

        if(isFinished){
          updates.status = 'finished';
        } else if(!gameState.bonusTurn){
          updates.bonusTurn = true;
          updates.timerStart = Date.now();
          updates.pausedAt = null;
          updates.pausedElapsed = 0;
        } else {
          // bonus was already used, advance
          const prevTurns = gameState.players[myPlayerId]?.turns||0;
          updates[`players/${myPlayerId}/turns`] = prevTurns + 1;
          updates.bonusTurn = false;
          updates.currentPlayer = (gameState.currentPlayer + 1) % playerOrder.length;
          updates.timerStart = Date.now();
          updates.pausedAt = null;
          updates.pausedElapsed = 0;
        }

        await update(ref(db, `rooms/${roomCode}`), updates);
      }, 500);
    } else {
      // No match
      setTimeout(async ()=>{
        const prevTurns = gameState.players[myPlayerId]?.turns||0;
        await update(ref(db, `rooms/${roomCode}`), {
          flipped: [],
          bonusTurn: false,
          [`players/${myPlayerId}/turns`]: prevTurns + 1,
          currentPlayer: (gameState.currentPlayer + 1) % playerOrder.length,
          timerStart: Date.now(),
          pausedAt: null,
          pausedElapsed: 0
        });
      }, 900);
    }
  }
}

async function advanceTurn(state, countTurn=true){
  const { playerOrder, currentPlayer, players } = state;
  const activeId = playerOrder[currentPlayer];
  const updates = {
    flipped: [],
    bonusTurn: false,
    currentPlayer: (currentPlayer + 1) % playerOrder.length,
    timerStart: Date.now(),
    pausedAt: null,
    pausedElapsed: 0
  };
  if(countTurn){
    const prevTurns = players[activeId]?.turns||0;
    updates[`players/${activeId}/turns`] = prevTurns + 1;
  }
  await update(ref(db, `rooms/${roomCode}`), updates);
}

// ── RESULT PANEL ──────────────────────────────────────────────────────────────
function showResult(cat, pair){
  document.getElementById('res-empty').style.display='none';
  document.getElementById('res-content').style.display='flex';
  const iconEl = document.getElementById('res-icon');
  const iconClass = (pair.icon||'fa-star').startsWith('fa-') ? pair.icon : 'fa-'+pair.icon;
  iconEl.innerHTML = `<i class="fa-solid ${iconClass}" style="font-size:48px;color:${cat.color};" aria-hidden="true"></i>`;
  const tag=document.getElementById('res-tag');
  tag.textContent=cat.name; tag.style.background=cat.bg; tag.style.color=cat.textColor;
  document.getElementById('res-title').textContent=pair.title;
  document.getElementById('res-sub').textContent=pair.subtitle;
  document.getElementById('res-body').textContent=pair.body;
  document.getElementById('rm1l').textContent=pair.m1l;
  const rm1v=document.getElementById('rm1v'); rm1v.textContent=pair.m1v; rm1v.style.color=cat.color;
  document.getElementById('rm2l').textContent=pair.m2l;
  document.getElementById('rm2v').textContent=pair.m2v;
}

function showWinBanner(state){
  const { players, playerOrder, catMatches } = state;
  const ordered = (playerOrder||[]).map(id=>({id,...(players[id]||{})}));
  // Sort by matches desc
  const ranked = [...ordered].sort((a,b)=>(b.matches||0)-(a.matches||0));
  const topScore = ranked[0]?.matches || 0;
  const winners = ranked.filter(p=>(p.matches||0)===topScore && topScore>0);

  // Winner name (handle ties)
  const nameEl = document.getElementById('win-winner-name');
  const subEl = document.getElementById('win-winner-sub');
  if(winners.length === 0){
    nameEl.textContent = 'No matches';
    subEl.textContent = 'Nobody found a pair this round';
  } else if(winners.length === 1){
    nameEl.textContent = winners[0].name;
    subEl.textContent = `Winner with ${topScore} match${topScore!==1?'es':''}`;
  } else {
    nameEl.textContent = winners.map(w=>w.name).join(' & ');
    subEl.textContent = `Tied at ${topScore} match${topScore!==1?'es':''}`;
  }

  // Standings rows
  const standings = document.getElementById('win-standings');
  standings.innerHTML = '';
  ranked.forEach((p,i)=>{
    const pct = p.turns ? Math.round((p.matches/p.turns)*100)+'%' : '—';
    const row = document.createElement('div');
    row.className = 'win-row' + (i===0 && topScore>0 ? ' first' : '');
    row.innerHTML = `<div class="win-rank">${i+1}</div>
      <div class="win-name">${p.name}</div>
      <div class="win-stats">${p.turns||0} turns · ${pct} hit rate</div>
      <div class="win-matches">${p.matches||0}</div>`;
    standings.appendChild(row);
  });

  // Category breakdown (total pairs found per category)
  const breakdown = document.getElementById('win-cat-breakdown');
  breakdown.innerHTML = '';
  CATEGORIES.forEach(cat=>{
    const cm = (catMatches||{})[cat.id]||{};
    const found = Object.values(cm).reduce((s,v)=>s+v,0);
    const total = cat.pairs.length;
    const tile = document.createElement('div');
    tile.className = 'win-cat';
    tile.innerHTML = `<div class="win-cat-dot" style="background:${cat.color};"></div>
      <div class="win-cat-name">${cat.name}</div>
      <div class="win-cat-val" style="color:${cat.color};">${found}/${total}</div>`;
    breakdown.appendChild(tile);
  });

  // Host-only restart note
  document.getElementById('win-host-note').textContent = isHost ? '' : 'Waiting for the host to start a new game';

  document.getElementById('win-lightbox').style.display='flex';
}

document.getElementById('play-again-btn').addEventListener('click', async ()=>{
  if(!isHost){ alert('Only the host can restart the game.'); return; }
  const cardOrder = buildCardOrder();
  const snap = await get(ref(db, `rooms/${roomCode}/players`));
  const players = snap.val()||{};
  const resetPlayers = {};
  Object.keys(players).forEach(id=>{ resetPlayers[id]={...players[id],turns:0,matches:0}; });
  await set(ref(db, `rooms/${roomCode}`), {
    status:'playing', cardOrder, flipped:[], matched:{},
    currentPlayer:0, bonusTurn:false, timerStart:Date.now(),
    pausedAt:null, pausedElapsed:0,
    players: resetPlayers,
    playerOrder: gameState.playerOrder,
    catMatches:getEmptyCatMatches(),
    lastMatch:null
  });
  boardBuilt = false;
  document.getElementById('board').innerHTML='';
  document.getElementById('res-empty').style.display='flex';
  document.getElementById('res-content').style.display='none';
  document.getElementById('win-lightbox').style.display='none';
});

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t = document.getElementById('my-turn-toast');
  t.textContent = msg;
  t.style.display='block';
  setTimeout(()=>{ t.style.display='none'; }, 2000);
}

// Enter key support in lobby
document.getElementById('create-name').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('create-btn').click(); });
document.getElementById('join-code').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('join-btn').click(); });
</script>
